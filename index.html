<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyCode - AI Mentor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>EasyCode</h1>
            <p>Your AI-powered coding mentor</p>
        </header>

        <div class="chat-box" id="chat-box">
            <div class="message assistant">
                <div class="message-content">
                    <p>Hello! I am the Master Orchestrator of EasyCode. How can I assist you with your learning today?
                    </p>
                </div>
            </div>
        </div>

        <div class="input-area">
            <textarea id="user-input" placeholder="Ask a question or share some code..."></textarea>
            <button id="send-btn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
